<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>ステラ返信下書きアシスタント 設定</title>
    <style>
      body {
        font-family: -apple-system, "Hiragino Sans", sans-serif;
        width: 320px;
        margin: 0;
        padding: 16px;
        font-size: 13px;
        color: #1f2937;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px 0;
        color: #06c755;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }
      input,
      textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 12px;
        box-sizing: border-box;
        font-family: inherit;
      }
      .hint {
        color: #6b7280;
        font-size: 11px;
        margin-top: 4px;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 10px;
        background: #06c755;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover {
        opacity: 0.9;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        min-height: 16px;
      }
      .status.ok {
        color: #059669;
      }
      .status.error {
        color: #dc2626;
      }
      hr {
        border: none;
        border-top: 1px solid #e5e7eb;
        margin: 16px 0;
      }
      .usage {
        color: #6b7280;
        font-size: 11px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>✨ 設定</h1>

    <label for="apiKey">Anthropic API キー</label>
    <input
      type="password"
      id="apiKey"
      placeholder="sk-ant-xxxxxxxxxxxxxxxxx"
      autocomplete="off"
    />
    <div class="hint">
      console.anthropic.com で発行したキー。<br />
      ローカルにのみ保存され、外部に送信されません。
    </div>

    <button id="saveBtn">保存</button>
    <div class="status" id="status"></div>

    <hr />
    <div class="usage">
      <b>使い方</b><br />
      1. LINE Official Account Manager または chat.line.biz を開く<br />
      2. 画面右上のパネルで「📋 画面から会話を読み取る」<br />
      3. 「✨ 下書きを生成」<br />
      4. 「▶ 入力欄に挿入」または「📋 コピー」
    </div>

    <script src="popup.js"></script>
  </body>
</html>
