name: MEO Review Watcher

on:
  schedule:
    # 5分おきに Gmail を確認し、新着クチコミがあれば Chatwork にドラフトを通知
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: meo-review-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: meo/requirements.txt

      - run: pip install -r meo/requirements.txt

      - run: python meo/watch_reviews.py
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
