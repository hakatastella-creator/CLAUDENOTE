name: Daily Reply Draft

on:
  schedule:
    # 毎日 朝7:00 JST = 22:00 UTC（前日）
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run draft generator
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
          SUMMARY_TO_EMAIL: ${{ secrets.SUMMARY_TO_EMAIL }}
          LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '24' }}
          HISTORY_LIMIT: ${{ vars.HISTORY_LIMIT || '10' }}
        run: python src/main.py
